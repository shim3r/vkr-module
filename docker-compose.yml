version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-app
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - siem-network
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    image: nginx:alpine
    container_name: siem-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - siem-network

networks:
  siem-network:
    driver: bridge
